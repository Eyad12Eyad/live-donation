<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eyad_Eyad12 - محول الفيديو</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #667eea;
            font-size: 2em;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 1.1em;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
            background: #f8f9ff;
        }

        .upload-area:hover {
            background: #f0f2ff;
            border-color: #764ba2;
        }

        .upload-area.dragover {
            background: #e8ebff;
            border-color: #764ba2;
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }

        .upload-area p {
            color: #666;
            font-size: 1.1em;
            margin: 10px 0;
        }

        input[type="file"] {
            display: none;
        }

        .video-info {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9ff;
            border-radius: 10px;
            display: none;
        }

        .video-info.active {
            display: block;
        }

        .video-info h3 {
            color: #667eea;
            margin-bottom: 15px;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .info-item:last-child {
            border-bottom: none;
        }

        .buttons {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-webm {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-webm:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-audio {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .btn-audio:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(245, 87, 108, 0.4);
        }

        .status-text {
            text-align: center;
            margin-top: 20px;
            color: #667eea;
            font-weight: bold;
            font-size: 1.1em;
            display: none;
        }

        .status-text.active {
            display: block;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #e0e0e0;
            color: #666;
        }

        video {
            display: none;
        }

        .progress {
            margin-top: 15px;
            text-align: center;
            color: #764ba2;
            font-weight: bold;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            .buttons {
                flex-direction: column;
            }

            .header h1 {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎬 Eyad_Eyad12</h1>
            <p>محول الفيديو واستخراج الصوت WAV ⚡</p>
        </div>

        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <p><strong>اضغط هنا أو اسحب الفيديو</strong></p>
            <p>جميع صيغ الفيديو مدعومة</p>
            <input type="file" id="fileInput" accept="video/*">
        </div>

        <div class="video-info" id="videoInfo">
            <h3>📋 معلومات الفيديو</h3>
            <div class="info-item">
                <span>اسم الملف:</span>
                <span id="fileName">-</span>
            </div>
            <div class="info-item">
                <span>الحجم:</span>
                <span id="fileSize">-</span>
            </div>
            <div class="info-item">
                <span>المدة:</span>
                <span id="duration">-</span>
            </div>
            <div class="info-item">
                <span>الدقة:</span>
                <span id="resolution">-</span>
            </div>
        </div>

        <div class="buttons">
            <button class="btn btn-webm" id="convertWebm" disabled>
                <span>🎥</span>
                <span>تحويل إلى WebM</span>
            </button>
            <button class="btn btn-audio" id="extractAudio" disabled>
                <span>🎵</span>
                <span>استخراج الصوت WAV</span>
            </button>
        </div>

        <div class="status-text" id="statusText">
            <div id="statusMessage">جاري المعالجة...</div>
            <div class="progress" id="progressText"></div>
        </div>

        <div class="footer">
            <p>💜 Eyad_Eyad12 © 2020</p>
            <p style="font-size: 0.9em; margin-top: 5px;">⚡ تحويل فوري - صوت WAV عالي الجودة</p>
        </div>
    </div>

    <video id="videoElement" crossorigin="anonymous"></video>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const videoInfo = document.getElementById('videoInfo');
        const convertWebmBtn = document.getElementById('convertWebm');
        const extractAudioBtn = document.getElementById('extractAudio');
        const statusText = document.getElementById('statusText');
        const statusMessage = document.getElementById('statusMessage');
        const progressText = document.getElementById('progressText');
        const videoElement = document.getElementById('videoElement');

        let selectedFile = null;

        // رفع الملف
        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        function handleFile(file) {
            if (!file.type.startsWith('video/')) {
                alert('الرجاء اختيار ملف فيديو');
                return;
            }

            selectedFile = file;
            
            document.getElementById('fileName').textContent = file.name;
            document.getElementById('fileSize').textContent = formatFileSize(file.size);

            videoElement.src = URL.createObjectURL(file);
            
            videoElement.onloadedmetadata = function() {
                const duration = Math.floor(videoElement.duration);
                const minutes = Math.floor(duration / 60);
                const seconds = duration % 60;
                document.getElementById('duration').textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
                document.getElementById('resolution').textContent = `${videoElement.videoWidth}x${videoElement.videoHeight}`;
                
                videoInfo.classList.add('active');
                convertWebmBtn.disabled = false;
                extractAudioBtn.disabled = false;
            };
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        }

        function downloadFile(blob, filename) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            setTimeout(() => {
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }, 100);
        }

        // دالة تحويل AudioBuffer إلى WAV
        function audioBufferToWav(audioBuffer) {
            const numberOfChannels = audioBuffer.numberOfChannels;
            const sampleRate = audioBuffer.sampleRate;
            const format = 1; // PCM
            const bitDepth = 16;

            const bytesPerSample = bitDepth / 8;
            const blockAlign = numberOfChannels * bytesPerSample;

            const data = [];
            for (let i = 0; i < audioBuffer.numberOfChannels; i++) {
                data.push(audioBuffer.getChannelData(i));
            }

            const interleaved = interleave(data);
            const dataLength = interleaved.length * bytesPerSample;
            const buffer = new ArrayBuffer(44 + dataLength);
            const view = new DataView(buffer);

            // WAV header
            writeString(view, 0, 'RIFF');
            view.setUint32(4, 36 + dataLength, true);
            writeString(view, 8, 'WAVE');
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, format, true);
            view.setUint16(22, numberOfChannels, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * blockAlign, true);
            view.setUint16(32, blockAlign, true);
            view.setUint16(34, bitDepth, true);
            writeString(view, 36, 'data');
            view.setUint32(40, dataLength, true);

            // Write PCM data
            floatTo16BitPCM(view, 44, interleaved);

            return new Blob([buffer], { type: 'audio/wav' });
        }

        function interleave(channelData) {
            const length = channelData[0].length;
            const numberOfChannels = channelData.length;
            const result = new Float32Array(length * numberOfChannels);

            let offset = 0;
            for (let i = 0; i < length; i++) {
                for (let channel = 0; channel < numberOfChannels; channel++) {
                    result[offset++] = channelData[channel][i];
                }
            }
            return result;
        }

        function writeString(view, offset, string) {
            for (let i = 0; i < string.length; i++) {
                view.setUint8(offset + i, string.charCodeAt(i));
            }
        }

        function floatTo16BitPCM(view, offset, input) {
            for (let i = 0; i < input.length; i++, offset += 2) {
                const s = Math.max(-1, Math.min(1, input[i]));
                view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
            }
        }

        // تحويل إلى WebM - سريع جداً
        convertWebmBtn.addEventListener('click', async () => {
            if (!selectedFile) return;
            
            convertWebmBtn.disabled = true;
            extractAudioBtn.disabled = true;
            statusText.classList.add('active');
            statusMessage.textContent = '⚡ جاري التحويل السريع إلى WebM...';
            progressText.textContent = '';

            try {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = videoElement.videoWidth;
                canvas.height = videoElement.videoHeight;

                const canvasStream = canvas.captureStream(30);
                
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const audioSource = audioContext.createMediaElementSource(videoElement);
                const audioDestination = audioContext.createMediaStreamDestination();
                
                audioSource.connect(audioDestination);
                audioSource.connect(audioContext.destination);

                const videoTrack = canvasStream.getVideoTracks()[0];
                const audioTrack = audioDestination.stream.getAudioTracks()[0];
                
                const combinedStream = new MediaStream([videoTrack, audioTrack]);

                const options = {
                    mimeType: 'video/webm;codecs=vp9,opus',
                    videoBitsPerSecond: 5000000,
                    audioBitsPerSecond: 128000
                };

                let mediaRecorder;
                try {
                    mediaRecorder = new MediaRecorder(combinedStream, options);
                } catch(e) {
                    options.mimeType = 'video/webm;codecs=vp8,opus';
                    mediaRecorder = new MediaRecorder(combinedStream, options);
                }

                const chunks = [];
                let startTime = Date.now();
                
                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) {
                        chunks.push(e.data);
                    }
                };

                mediaRecorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'video/webm' });
                    const originalName = selectedFile.name.substring(0, selectedFile.name.lastIndexOf('.')) || 'video';
                    const filename = `${originalName}_Eyad_Eyad12.webm`;
                    
                    downloadFile(blob, filename);
                    
                    const processingTime = ((Date.now() - startTime) / 1000).toFixed(1);
                    statusMessage.textContent = `✅ تم التحويل بنجاح في ${processingTime} ثانية!`;
                    progressText.textContent = `حجم الملف: ${formatFileSize(blob.size)}`;
                    
                    setTimeout(() => {
                        statusText.classList.remove('active');
                        convertWebmBtn.disabled = false;
                        extractAudioBtn.disabled = false;
                    }, 3000);
                };

                mediaRecorder.start(10);

                videoElement.muted = false;
                videoElement.currentTime = 0;
                await videoElement.play();

                let frameCount = 0;
                const totalFrames = Math.floor(videoElement.duration * 30);

                function drawFrame() {
                    if (!videoElement.paused && !videoElement.ended) {
                        ctx.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
                        frameCount++;
                        const progress = Math.floor((frameCount / totalFrames) * 100);
                        progressText.textContent = `التقدم: ${progress}%`;
                        requestAnimationFrame(drawFrame);
                    }
                }
                
                drawFrame();

                videoElement.onended = () => {
                    setTimeout(() => {
                        mediaRecorder.stop();
                        videoElement.pause();
                        audioContext.close();
                    }, 100);
                };

            } catch (error) {
                console.error('Error:', error);
                alert('حدث خطأ: ' + error.message);
                statusText.classList.remove('active');
                convertWebmBtn.disabled = false;
                extractAudioBtn.disabled = false;
            }
        });

        // استخراج الصوت بصيغة WAV
        extractAudioBtn.addEventListener('click', async () => {
            if (!selectedFile) return;
            
            convertWebmBtn.disabled = true;
            extractAudioBtn.disabled = true;
            statusText.classList.add('active');
            statusMessage.textContent = '⚡ جاري استخراج الصوت بصيغة WAV...';
            progressText.textContent = '';

            try {
                const startTime = Date.now();

                // قراءة الملف كـ ArrayBuffer
                const arrayBuffer = await selectedFile.arrayBuffer();
                
                // فك تشفير الصوت
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                statusMessage.textContent = '🔄 جاري معالجة الصوت...';
                
                const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
                
                progressText.textContent = '90%';
                statusMessage.textContent = '📝 جاري إنشاء ملف WAV...';
                
                // تحويل إلى WAV
                const wavBlob = audioBufferToWav(audioBuffer);
                
                const originalName = selectedFile.name.substring(0, selectedFile.name.lastIndexOf('.')) || 'audio';
                const filename = `${originalName}_Eyad_Eyad12.wav`;
                
                downloadFile(wavBlob, filename);
                
                const processingTime = ((Date.now() - startTime) / 1000).toFixed(1);
                statusMessage.textContent = `✅ تم استخراج الصوت WAV بنجاح في ${processingTime} ثانية!`;
                progressText.textContent = `حجم الملف: ${formatFileSize(wavBlob.size)} | جودة: ${audioBuffer.sampleRate}Hz`;
                
                audioContext.close();
                
                setTimeout(() => {
                    statusText.classList.remove('active');
                    convertWebmBtn.disabled = false;
                    extractAudioBtn.disabled = false;
                }, 3000);

            } catch (error) {
                console.error('Error:', error);
                alert('حدث خطأ: ' + error.message);
                statusText.classList.remove('active');
                convertWebmBtn.disabled = false;
                extractAudioBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
